name: Build and deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
        # GoatCounter site code is injected only for this public GitHub
        # Pages build. Set it as a repo variable (Settings → Secrets and
        # variables → Actions → Variables → New variable → GOATCOUNTER_CODE).
        # It's not a secret — the code ends up in the public client bundle
        # either way — so a plain repo variable is correct. If unset,
        # analytics stay off and the build is unaffected.
        env:
          VITE_GOATCOUNTER_CODE: ${{ vars.GOATCOUNTER_CODE }}
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
