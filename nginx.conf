# Standby SPA — nginx config used inside the Docker image.
#
# Three pieces of behavior worth knowing about:
#   1. Hashed assets (Vite emits content-hashed filenames in /assets/) get
#      a 1-year immutable cache header. Safe because they change names
#      when content changes.
#   2. index.html and the service worker are sent with `no-cache` so a
#      deploy is picked up immediately.
#   3. Unknown routes fall back to index.html so client-side routing works.

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        application/wasm
        image/svg+xml;

    # Long-cached hashed assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Font files (woff/woff2) also benefit from long caching.
    location ~* \.(woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Service worker must be fresh on every page load — that's how updates
    # propagate quickly.
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    location = /workbox-9c191d2f.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # Manifest + index also no-cache to keep deploys snappy.
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # SPA fallback — react-router-dom handles unknown paths client-side.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
